name: Get TIPS Yields

# FedInvest prices available ~1pm–5pm ET, Mon–Fri (non-holidays)
# ET = UTC-5 (EST) or UTC-4 (EDT); 17:00–22:00 UTC covers both.
# Adjust frequency below (currently every 30 minutes).
# Note: GitHub Actions cron cannot skip holidays — runs will produce no change
#       on holidays since FedInvest returns no data; the commit step is a no-op.

on:
  schedule:
    - cron: '*/30 17-22 * * 1-5'   # ← change frequency here
  workflow_dispatch:                  # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get TIPS yields
        run: node getTipsYields.js

      - name: Commit data/TipsYields.csv if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/TipsYields.csv
          git diff --cached --quiet || git commit -m "chore: update TipsYields.csv [skip ci]"
          git pull --rebase origin main
          git push
